# FireboltVL: Joint Vision-Language Model (V-JEPA + Expert Connector + SSM + LLM loss)

# --- Model ---
model:
  # Vision encoder (V-JEPA style; SigLIP as default placeholder)
  vision_encoder_type: "siglip"  # "siglip" | "siglip_grid" (V-JEPA when available)
  vision_ckpt_path: "/home/mamba/ML_project/Testing/Huy/joint_vlm/viper-vlm/pretrained/siglip384"
  vision_hidden_size: 1152
  vision_freeze: False

  # Routing: top-k vision tokens
  routing_top_k: 32

  # Expert Connector
  num_experts: 4
  expert_top_k: 2
  expert_hidden_dim: 512
  expert_dropout: 0.1

  # State-Space Model on visual stream
  ssm_type: "s4"  # "s4" | "s4d" | "self_attn"
  ssm_d_state: 64
  ssm_dropout: 0.1

  # Project visual tokens to LLM dim before concat
  llm_hidden_size: 1024  # set from base_lm at runtime
  visual_proj_dim: 1024
  visual_proj_layers: 1
  visual_proj_dropout: 0.1

  # LLM backbone
  lm_name_or_path: "LiquidAI/LFM2-350M"
  freeze_llm: False

  # Special tokens
  image_token_id: 64400

  # Auxiliary losses: stage 2 uses LM CE/NLL only; stage 1 can enable DINO.
  aux_balance_loss_enabled: false
  aux_balance_loss_weight: 0.01
  aux_recon_loss_enabled: false
  aux_recon_loss_weight: 0.1
  recon_mask_ratio: 0.5
  recon_mask_prob: 0.5
  recon_teacher_model: "facebook/vjepa2-vitg-fpc64-384"
  recon_teacher_hidden_size: 1408
  aux_contrastive_loss_enabled: false
  aux_contrastive_loss_weight: 0.1
  contrastive_embed_dim: 512
  contrastive_temperature: 0.07
  contrastive_learnable_temp: true
  aux_dino_loss_enabled: false
  aux_dino_loss_weight: 1.0
  dino_teacher_model: "facebook/dinov2-base"
  dino_teacher_hidden_size: 768
  dino_student_temperature: 0.1
  dino_teacher_temperature: 0.04

# --- Data ---
data:
  image_path: "/home/mamba/ML_project/Testing/Huy/joint_vlm/dataset"
  json_path: "/home/mamba/ML_project/Testing/Huy/joint_vlm/dataset/sharellava_mmpr12_merged_converted_fixed.jsonl"
  train_val_split: [0.99, 0.01]
  max_length: 4096

# --- Training ---
# Stage 1: freeze LLM + vision encoder, train connector only (router, expert_connector, ssm, visual_proj).
# Stage 2: train all (unfreeze LLM and optionally vision).
training:
  stage: 2 # 1 = connector only; 2 = full fine-tune
  num_epochs: 3
  # Stage-specific overrides (optional). If set, override num_epochs/lr per stage.
  stage1:
    num_epochs: 3
    lr: 1e-4
  stage2:
    num_epochs: 2
    lr: 5e-5
  batch_size: 4
  num_workers: 32
  device: "cuda"
  results_dir: "fireboltvl_results"
  resume_from_checkpoint: "/home/mamba/ML_project/Testing/Huy/joint_vlm/FireboltVL/outputs/2026-02-06/11-13-38/fireboltvl_results/stage1/epoch_3/"  # For stage 2: set to stage 1 output dir (e.g. fireboltvl_results/stage1/epoch_3)
  optimizer:
    name: "muon_adamw"
    lr: 1e-4
    weight_decay: 0.01
    muon_momentum: 0.95
    muon_nesterov: true
    muon_ns_steps: 5
    muon_eps: 1e-7
    muon_adjust_lr_fn: "match_rms_adamw"
  scheduler:
    T_max: 10
    eta_min: 1e-6
  ddp:
    enabled: False
    rank: 0
    world_size: 1
  amp_dtype: "bf16"

# --- Evaluation / Inference ---
evaluation:
  model_dir: "/home/mamba/ML_project/Testing/Huy/joint_vlm/FireboltVL/fireboltvl_results/stage2/epoch_1"
  tokenizer_dir: "/home/mamba/ML_project/Testing/Huy/joint_vlm/liquid_tokenizer_cot_fixed"
  prompt: "What is the original flight in the image?"
  image_path: "/home/mamba/ML_project/Testing/Huy/joint_vlm/viper-vlm/image2.jpg"
  do_sample: False
  top_p: 1.0
  temperature: 1.0
  repetition_penalty: 1.05
  max_new_tokens: 96

# --- Tokenizer & Processor ---
tokenizer_path: "/home/mamba/ML_project/Testing/Huy/joint_vlm/liquid_tokenizer_cot_fixed"
processor_path: "/home/mamba/ML_project/Testing/Huy/joint_vlm/viper-vlm/pretrained/siglip384"

logging:
  filename: "logs/fireboltvl.log"
